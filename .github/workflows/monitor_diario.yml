name: Monitor Diario — Senado Nacional

on:
  schedule:
    - cron: "10 11 * * *"   # 08:10 Argentina (UTC-3) — desfasado 10 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-senado:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏛️ Ejecutar Monitor de Senadores
        run: python pipeline.py

      - name: 🔄 Actualizar fallback en senado.html
        run: python scripts/actualizar_fallback_senado.py

      - name: 📊 Actualizar array en indicadores_senadores.html
        run: python scripts/actualizar_indicadores_senado.py

      - name: 📊 Actualizar bloques y nómina detallada
        run: python scripts/actualizar_bloques_nomina_senado.py

      - name: 🏛️ Actualizar comisiones por senador
        run: python scripts/actualizar_comisiones_senado.py

      - name: 📄 Actualizar versiones taquigráficas
        run: python scripts/actualizar_versiones_taq_senado.py

      - name: 📤 Commit y push de datos
        run: |
          git config --global user.name  "Monitor Bot"
          git config --global user.email "bot@monitor-senado.ar"
          git add data/ \
                  dashboard/senado.html \
                  dashboard/indicadores_senadores.html \
                  dashboard/indicadores_bloques_senadores.html \
                  dashboard/nomina_detalle_senadores.html
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "Monitor Senado — $(date '+%Y-%m-%d')"
            git push
          fi
