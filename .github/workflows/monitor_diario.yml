name: Monitor Diario — Senado Nacional

on:
  schedule:
    - cron: "10 11 * * *"   # 08:10 Argentina (UTC-3) — desfasado 10 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-senado:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏛️ Ejecutar Monitor de Senadores
        run: python pipeline.py

      - name: 📤 Commit y push de datos
        run: |
          git config --global user.name  "Monitor Bot"
          git config --global user.email "bot@monitor-senado.ar"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git stash
            git pull --rebase origin main
            git stash pop
            git add data/
            git commit -m "Monitor Senado — $(date '+%Y-%m-%d')"
            git push
          fi