name: Tests Diarios Monitor Senadores

on:
  schedule:
    - cron: '10 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  unit-tests:
    name: Tests Unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx pytest-cov

      - name: Ejecutar tests unitarios
        env:
          DATABASE_URL: ""
        run: |
          pytest tests/test_core_senadores.py tests/test_api_senado.py \
            -v \
            --tb=short \
            --junitxml=test-results/unit.xml \
            -p no:warnings

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 30

  notificar:
    name: Notificaciones
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()

    steps:
      - name: Capturar fecha
        id: fecha
        run: echo "fecha=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Notificar exito
        if: needs.unit-tests.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor Tests Senadores <${{ secrets.MAIL_USER }}>
          subject: "Tests OK - Monitor Senadores ${{ steps.fecha.outputs.fecha }}"
          body: |
            Todos los tests unitarios pasaron correctamente.

            Tests core/senadores.py: OK
            Tests api/run_senado.py: OK

            Ver detalles: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notificar fallo
        if: needs.unit-tests.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor Tests Senadores <${{ secrets.MAIL_USER }}>
          subject: "Tests FALLARON - Monitor Senadores ${{ steps.fecha.outputs.fecha }}"
          body: |
            Los tests unitarios fallaron. Se requiere revision urgente.

            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Posibles causas:
            - Cambios en core/senadores.py (calcular_kpis, reporte_provincial)
            - Cambios en api/run_senado.py o _latest_csv()
            - Dependencias desactualizadas en requirements.txt
