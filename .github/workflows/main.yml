name: Monitor Legislativo —Senadores

on:
  workflow_dispatch:   # ejecución manual desde GitHub
  schedule:
    - cron: "0 11 * * *"   # todos los días a las 08:00 AM Argentina (UTC-3)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 pandas

      # ── Diputados ────────────────────────────────────────────────────────────
      - name: Scraper Diputados
        run: python obtener_datos.py
        continue-on-error: true   # si falla diputados, senadores igual corre

      # ── Senadores ────────────────────────────────────────────────────────────
      - name: Scraper Senadores
        run: python pipeline_senado.py

      # ── Commit de resultados ─────────────────────────────────────────────────
      - name: Guardar cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git add nomina_diputados.csv || true
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "auto: actualización nóminas $(date +'%Y-%m-%d')"
            git push
          fi
